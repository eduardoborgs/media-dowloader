services:
  - type: web
    name: mediaget-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://seu-app.vercel.app   # Atualizar após deploy do frontend
      - key: MAX_FILE_SIZE_MB
        value: "200"